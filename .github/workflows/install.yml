name: Build and Release

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "mk/**"
      - "agent/**"
      - "**.py"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "mk/**"
      - "agent/**"
      - "**.py"
  workflow_dispatch:

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - id: set_tag
        name: Calculate Tag and Release Info
        run: bash mk/ci.sh set_tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - id: check_luna
        name: Check Luna Enable Status
        run: |
          # Read luna.enable from .conf, default to false if not found
          luna_enable=$(python -c "import configparser; c = configparser.ConfigParser(); c.read('mk/.conf'); print(c.get('luna', 'enable', fallback='false').lower())")
          echo "luna_enable=$luna_enable" >> $GITHUB_OUTPUT
          echo "Luna build enabled: $luna_enable"

    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      is_release: ${{ steps.set_tag.outputs.is_release }}
      luna_enable: ${{ steps.check_luna.outputs.luna_enable }}

  # Package Resources independently
  package-resources:
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Create Resource Package
        run: |
          python mk/resource_package.py ${{ needs.meta.outputs.tag }}
          
      - name: Upload Resource Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MaaGF1-Resource-${{ needs.meta.outputs.tag }}
          path: install/MaaGF1-Resource-*.zip

  install:
    needs: meta
    runs-on: windows-latest
    strategy:
      matrix:
        os: [win]
        arch: [x86_64, aarch64]
        variant: [standard, with-agent]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Read Configuration
        id: config
        shell: bash
        run: |
          # Parse INI file using Python for cross-platform compatibility
          maafw_ver=$(python -c "import configparser; c = configparser.ConfigParser(); c.read('mk/.conf'); print(c['check']['maafw'])")
          echo "maafw_version=$maafw_ver" >> $GITHUB_OUTPUT
          echo "Target maafw version: $maafw_ver"

      # --- Cache Mechanism for Python Dependencies ---
      # 1. Create
      - name: Create Virtual Environment
        run: python -m venv venv

      # 2. Activate (Add venv/Scripts to PATH)
      # all subsequent 'python' commands will automatically use the interpreter provided by venv.
      - name: Activate Virtual Environment
        shell: bash
        run: echo "${{ github.workspace }}/venv/Scripts" >> $GITHUB_PATH

      # 3. Cache
      - name: Cache Virtual Environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: venv
          # Key:
          # 1. OS & Arch: Basic Environment;
          # 2. mk/.conf: MaaFw's Version;
          # 3. install.yml: Versions such as requests and pyinstaller, which are hardcoded in YAML.
          key: venv-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('mk/.conf') }}-${{ hashFiles('.github/workflows/install.yml') }}
          restore-keys: |
            pip-${{ matrix.os }}-${{ matrix.arch }}-

      # 4. Install Deps (if cache misses)
      - name: Install Python dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install requests pyinstaller
          pip install maafw==${{ steps.config.outputs.maafw_version }}
          pip install numpy Pillow

          echo "=== Installed packages ==="
          pip list

      - name: Read Config and Get Dependencies Info
        id: deps_info
        shell: bash
        run: bash mk/ci.sh get_deps
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Cache Mechanism for MFAAvalonia ---
      - name: Cache MFAAvalonia
        id: cache-mfa
        uses: actions/cache@v4
        with:
          path: deps/bin
          # Key includes OS, Arch, and the resolved Tag to ensure uniqueness
          key: mfa-deps-${{ matrix.os }}-${{ matrix.arch }}-${{ steps.deps_info.outputs.mfa_tag }}

      - name: Download MFAAvalonia
        if: steps.cache-mfa.outputs.cache-hit != 'true'
        uses: robinraju/release-downloader@v1
        with:
          repository: ${{ steps.deps_info.outputs.mfa_repo }}
          fileName: "MFAAvalonia-*-${{ matrix.os }}-${{ (matrix.arch == 'x86_64' && 'x64') || (matrix.arch == 'aarch64' && 'arm64') }}*"
          latest: ${{ steps.deps_info.outputs.config_mfa_tag == 'latest' }}
          tag: ${{ steps.deps_info.outputs.config_mfa_tag != 'latest' && steps.deps_info.outputs.config_mfa_tag || '' }}
          out-file-path: "deps/bin"
          extract: true

      - name: Clean up MFAAvalonia archive
        if: steps.cache-mfa.outputs.cache-hit != 'true'
        shell: bash
        run: find deps/bin -name "*.zip" -type f -delete

      # --- Cache Mechanism for Agent Compilation ---
      # Only runs if variant is with-agent.
      # Hashes all python files in agent directory to detect changes.
      - name: Cache Agent Build
        if: matrix.variant == 'with-agent'
        id: cache-agent
        uses: actions/cache@v4
        with:
          path: agent/dist
          key: agent-build-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('agent/**/*.py', 'agent/mk/*.py', 'agent/*.conf') }}

      - name: Run Install Script
        shell: bash
        run: |
          # install.py will check if agent/dist exists (restored from cache)
          # If it exists, it skips the build process.
          python ./mk/install.py ${{ needs.meta.outputs.tag }} --variant ${{ matrix.variant }}

      - name: Generate Build Report
        shell: bash
        env:
          BUILD_TAG: ${{ needs.meta.outputs.tag }}
          BUILD_ARCH: ${{ matrix.arch }}
          BUILD_OS: ${{ matrix.os }}
          BUILD_VARIANT: ${{ matrix.variant }}
          IS_RELEASE: ${{ needs.meta.outputs.is_release }}
          MFA_TAG: ${{ steps.deps_info.outputs.mfa_tag }}
          MFA_DATE: ${{ steps.deps_info.outputs.mfa_date }}
          MFA_URL: ${{ steps.deps_info.outputs.mfa_url }}
          MFA_PRERELEASE: ${{ steps.deps_info.outputs.mfa_prerelease }}
        run: |
          python ./mk/report.py

      - name: Determine Artifact Name
        id: artifact_name
        shell: bash
        run: |
          if [ "${{ matrix.variant }}" == "with-agent" ]; then
            SUFFIX="-Agent"
          else
            SUFFIX=""
          fi
          echo "name=MaaGF1-GUI-${{ needs.meta.outputs.tag }}-${{ matrix.arch }}${SUFFIX}" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: "install"

  # Runtime Replace (Luna Build)
  runtime-replace:
    needs: [meta, install]
    # Check if Luna build is enabled in .conf
    if: ${{ needs.meta.outputs.luna_enable == 'true' }}
    runs-on: windows-latest 
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      # Pip install
      - name: Install PyInstaller and dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller frida

      - name: Read Luna Configuration
        id: config
        shell: bash
        run: |
          repo=$(python -c "import configparser; c = configparser.ConfigParser(); c.read('mk/.conf'); print(c['luna']['repo'])")
          tag=$(python -c "import configparser; c = configparser.ConfigParser(); c.read('mk/.conf'); print(c['luna']['tag'])")
          echo "repo=$repo" >> $GITHUB_OUTPUT
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "Luna Config: Repo=$repo, Tag=$tag"

      # 1. Download the base artifact (x86_64, with-agent)
      - name: Download Base Artifact
        uses: actions/download-artifact@v4
        with:
          name: MaaGF1-GUI-${{ needs.meta.outputs.tag }}-x86_64-Agent
          path: base_artifact

      # 2. Download the Luna MaaFramework
      - name: Download Luna MaaFramework
        uses: robinraju/release-downloader@v1
        with:
          repository: ${{ steps.config.outputs.repo }}
          tag: ${{ steps.config.outputs.tag }}
          fileName: "MAA-win-x86_64-*.zip"
          out-file-path: "deps_luna"
          extract: false # Keep it zipped for the script to handle

      # 3. Run the replacement script
      - name: Execute Runtime Replace
        # Bash to use `find`
        shell: bash
        run: |
          # Find the downloaded zip file
          LUNA_ZIP=$(find deps_luna -name "MAA-win-x86_64-*.zip" | head -n 1)
          
          python mk/runtime_replace.py \
            --base base_artifact \
            --luna-pkg "$LUNA_ZIP" \
            --output install_luna

      # 4. Upload the new artifact
      # Note: We upload the directory. The release job's zip_assets script handles zipping folders starting with MaaGF1-GUI
      - uses: actions/upload-artifact@v4
        with:
          name: MaaGF1-GUI-${{ needs.meta.outputs.tag }}-x86_64-Luna
          path: install_luna

  build-summary:
    if: always()
    needs: [meta, install]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Overall Build Summary
        run: bash mk/ci.sh summary
        env:
          TAG: ${{ needs.meta.outputs.tag }}
          IS_RELEASE: ${{ needs.meta.outputs.is_release }}
          STATUS_INSTALL: ${{ needs.install.result }}

  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  release:
    # Use strict evaluation to prevent skipping if runtime-replace is intentionally skipped
    if: |
      always() && 
      needs.meta.outputs.is_release == 'true' && 
      needs.install.result == 'success' && 
      needs.package-resources.result == 'success' && 
      needs.changelog.result == 'success' &&
      (needs.runtime-replace.result == 'success' || needs.runtime-replace.result == 'skipped')
    needs: [install, package-resources, runtime-replace, changelog, meta]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # GUI and Resource artifacts
      - uses: actions/download-artifact@v4
        with:
          pattern: MaaGF1-*
          path: assets
          merge-multiple: false

      - name: Zip Assets
        run: bash mk/ci.sh zip_assets
        env:
          TAG: ${{ needs.meta.outputs.tag }}

      - uses: softprops/action-gh-release@v2
        with:
          files: assets/*.zip
          tag_name: ${{ needs.meta.outputs.tag }}
          body: ${{ needs.changelog.outputs.release_body }}
          draft: false
          generate_release_notes: true
          prerelease: ${{ contains(needs.meta.outputs.tag, '-alpha') || contains(needs.meta.outputs.tag, '-beta') || contains(needs.meta.outputs.tag, '-rc') || contains(needs.meta.outputs.tag, '-pre') || contains(needs.meta.outputs.tag, '-dev') }}

      - name: Release Summary
        run: bash mk/ci.sh release_summary
        env:
          TAG: ${{ needs.meta.outputs.tag }}