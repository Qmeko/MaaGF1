[check]
# The specific version of maafw (python) to install
maafw=5.2.6

[install]
# The repository to download MFAAvalonia from
mfa_repo=SweetSmellFox/MFAAvalonia
# The tag to download (e.g., "v1.7.2") or "latest"
mfa_tag=v2.9.1

# Repository and Tag for LogDog
logdog_repo=MaaGF1/logdog
logdog_tag=latest

# Repository and Tag for Docs
docs_repo=MaaGF1/docs
docs_tag=latest

[luna]
# The repository for the specific MaaFramework version (Luna build)
repo=MaaGF1/MaaFramework
# The tag to download
tag=v5.6.0